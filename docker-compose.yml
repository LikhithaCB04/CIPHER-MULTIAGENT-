version: '3.8'

services:
  likitha-devops-agent:
    build: 
      context: .
      dockerfile: agents/likitha_devops/Dockerfile
    container_name: likitha-devops-agent
    ports:
      - '8004:8004'
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
    volumes:
      - ./agents/likitha_devops:/app

  orchestrator:
    image: alpine
    container_name: master-orchestrator
    command: /bin/sh -c 'while true; do sleep 3600; done'
    ports:
      - '8000:8000'

  deepthi-data-agent:
    image: alpine
    ports: ['8001:8001']
    command: /bin/sh -c 'while true; do sleep 3600; done'

  ayeesha-fullstack-agent:
    image: alpine
    ports: ['8002:8002']
    command: /bin/sh -c 'while true; do sleep 3600; done'

  mahima-security-agent:
    image: alpine
    ports: ['8003:8003']
    command: /bin/sh -c 'while true; do sleep 3600; done'
